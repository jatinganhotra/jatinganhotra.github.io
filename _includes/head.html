<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <meta name="twitter:card" content="https://avatars.githubusercontent.com/u/307606">
  <meta name="twitter:creator" content="@JatinGanhotra" >
  <meta name="twitter:title" content="{{- page.title -}}">
  <meta name="twitter:image" content="{{- card-filename -}}">
  <meta property="og:image" content="https://avatars.githubusercontent.com/u/307606">
  <meta property="og:description" content="{{- page.title -}}">
  <meta property="og:image:type" content="image/jpeg">
  <!-- <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="675"> -->
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  <link rel="shortcut icon" type="image/png" href="/assets/images/favicon-32x32.png">
  <link rel="shortcut icon" type="image/png" href="/assets/images/favicon-16x16.png">
  <link rel="shortcut icon" type="image/png" href="/assets/images/favicon.ico">
  <link rel="shortcut icon" type="image/png" href="/assets/images/apple-touch-icon-precomposed.png">
  <link rel="shortcut icon" type="image/png" href="/assets/images/apple-touch-icon.png">
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}

  {%- include custom-head.html -%}
  
</head>
